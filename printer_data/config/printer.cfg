[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_430028000651323235363233-if00
#canbus_uuid: d7688492daca		
#canbus_interface: can1

[mcu nhk]
serial: /dev/serial/by-id/usb-Klipper_rp2040_3232323236198137-if00

[mcu cartographer]
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_38001C00135030514B343620-if00
restart_method: command #

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 6000    			
max_z_velocity: 200			
max_z_accel: 750
square_corner_velocity: 5.0

[temperature_sensor main_mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 150

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 150

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105


[include mainsail.cfg]

[exclude_object]

[include KAMP_Settings.cfg]

[include jw_led_effects_3_leds.cfg]

#####################################################################
#   Accelerometer
#####################################################################
[adxl345]
#cs_pin: nhk:gpio27
#spi_software_sclk_pin: nhk:gpio18
#spi_software_mosi_pin: nhk:gpio20
#spi_software_miso_pin: nhk:gpio19
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1
axes_map: y,-x,z

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
##--------------------------------------------------------------------
## Uncomment below for 250mm build
#probe_points:
#    125, 125, 20

## Uncomment below for 300mm build
#probe_points:
#    155, 155, 20

## Uncomment below for 350mm build
probe_points:
    175, 175, 20


#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: nhk:gpio23
dir_pin: !nhk:gpio24
enable_pin: !nhk:gpio25
microsteps: 16
rotation_distance: 35.2												#Be sure to calibrate
gear_ratio: 44:8, 25:17
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nhk:gpio9
sensor_type: Generic 3950
sensor_pin: nhk:gpio29
pullup_resistor: 2200
#control: pid                                                        # Do PID calibration after initial checks
#pid_Kp: 28.182
#pid_Ki: 1.978
#pid_Kd: 100.397
min_temp: 0
max_temp: 315
min_extrude_temp: 170
max_extrude_only_distance: 1000                                     
max_extrude_cross_section: 30                                       
pressure_advance: 0.052                                             #Be sure to calibrate
pressure_advance_smooth_time: 0.040

[tmc2209 extruder]
uart_pin: nhk:gpio0
tx_pin: nhk:gpio1
interpolate: false
run_current: 0.65     #.55 minimum DO NOT EXCEED .7A as it will cause excess heat.
sense_resistor: 0.100
stealthchop_threshold: 0
driver_TBL: 1
driver_TOFF: 3
driver_HSTRT: 0
driver_HEND: 3                   

#####################################################################
#   Fans
#####################################################################
## PCF
[fan]
pin: nhk:gpio6
kick_start_time: .3
off_below: 0.1


## HEF
[heater_fan hotend_fan]
pin: nhk:gpio5
tachometer_pin: nhk:gpio16
tachometer_ppr: 2
max_power: 1.0
kick_start_time: .1
heater: extruder
heater_temp: 50.0
fan_speed: 1


[input_shaper]
shaper_freq_x: 104.2
shaper_type_x: 3hump_ei
shaper_freq_y: 88.4
shaper_type_y: 3hump_ei

[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 23 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output

